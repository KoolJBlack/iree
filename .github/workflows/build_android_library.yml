name: Build Android Library

on:
  push:
    branches: [ android-library-action ]
  pull_request:
    branches: [ android-library-action ]

jobs:
  Explore-GitHub-Actions:
      runs-on: ubuntu-latest
      steps:
        - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
        - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
        - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
        - name: Check out repository code
          uses: actions/checkout@v2
        - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
        - run: echo "🖥️ The workflow is now ready to test your code on the runner."
        - name: List files in the repository
          run: |
            ls ${{ github.workspace }}
        - run: echo "🍏 This job's status is ${{ job.status }}."
  Build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/tflite/java
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: false
    - name: set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: '11'
        distribution: 'adopt'
    - name: Ls the working directory
      run: ls -las .
    - name: Ls third_party directory
      run: |
        ls -las ../../../third_party/
        ls -las ../../../third_party/mlir-hlo

    - name: Setup Gradle Wrapper
      run: gradle  wrapper --debug --scan
    - uses: seanmiddleditch/gha-setup-ninja@master
    - name: Build with Gradle
      run: ./gradlew build --debug --full-stacktrace --scan
